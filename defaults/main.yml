---
pg_version: 15

backup_packages:
  - libpq5
  - tree
  - rsync

backup_retention:
  etcd_days: 2
  docker_days: 2
  config_days: 2
  full_count: 1

backup_schedule:
  daily: "Mon..Fri 22:00:00"
  full: "Sun 01:00"

paths:
  base: /backups
  postgres: "{{ paths.base }}/postgres"
  etcd: "{{ paths.base }}/etcd"
  configs: "{{ paths.base }}/configs"
  volumes: "{{ paths.base }}/docker_volumes"
  logs_pg: /var/log/pgbackrest
  logs: /var/log
  core: /root/backup_scripts
  pgbackrest: "/etc/pgbackrest"
  conf_pgbackrest: "{{ paths.pgbackrest }}/pgbackrest.conf"

postgres:
  host: svx-express-postgres.ar.int
  user: postgres
  data_dir: "/var/lib/postgresql/{{ pg_version }}/main"
  owner_psql_backupdir: root #на бэкап сервере
  ssh_key: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIFsT0TtMMPLuYTRbLXD1ogOHypyWSKMhQGv5wTGSeaSu postgres@svx-express-postgres"
  ip: "192.168.221.7"

hosts:
  backup: main.crafttech
  back: back.express.crafttech
  
etcd: 
  host: svx-express-ekr.ar.int
  port: 2379

logs: 
  backup_config: "/var/log/backup_config.log"
  full_backup: "/var/log/backup_full.log"
  daily_backup: "/var/log/backup_daily.log"
  clean_backup: "/var/log/clean_backups.log"
