---
- name: Install base packages
  package:
    name: "{{ backup_packages }}"
    state: present

- name: Copy core scripts
  copy:
    src: core/
    dest: /usr/local/bin/
    mode: '0755'

- name: Copy pgbackrest.conf_psql_server
  template:
    src: pgbackrest/pgbackrest.conf_psql_server.j2
    dest: "{{ paths.core }}/pgbackrest.conf_psql_server"

- name: Deploy ~/ssh/config
  template:
    src: backup_core/ssh_config.j2
    dest: "~/.ssh/config"

- name: Copy alias.sh
  template:
    src: backup_core/alias.sh.j2
    dest: "{{ paths.core }}/alias.sh"

- name: Deploy motd
  template:
    src: backup_core/moth.sh.j2
    dest: "{{ paths.core }}/moth.sh"
    mode: '0755'

- name: Copy backup_config.sh
  copy:
    src: core/backup_config.sh
    dest: "{{ paths.core }}/backup_config.sh"
    mode: '0755'

- name: Deploy start.sh
  template:
    src: backup_core/start.sh.j2
    dest: "{{ paths.core }}/start.sh"
    mode: '0755'

- name: Deploy remove script
  template:
    src: backup_core/remove_backup_server.sh.j2
    dest: "{{ paths.core }}/remove_backup_server.sh"
    mode: '0755'